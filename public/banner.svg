<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#ff6b81"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff3333" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff3333" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="terminalHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Glow behind terminal -->
  <ellipse cx="600" cy="350" rx="500" ry="250" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- ===== LEFT SIDE: Branding ===== -->

  <!-- Terminal icon -->
  <g transform="translate(80, 267)">
    <rect x="0" y="0" width="80" height="65" rx="6" fill="#0f0f23" stroke="#ff3333" stroke-width="2.5"/>
    <path d="M12 22 L26 32 L12 42" stroke="#ff3333" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="36" y1="40" x2="64" y2="40" stroke="#ff3333" stroke-width="3" stroke-linecap="round"/>
    <rect x="0" y="0" width="80" height="14" rx="6" fill="#ff3333" opacity="0.12"/>
    <circle cx="12" cy="7" r="3" fill="#ff3333"/>
    <circle cx="24" cy="7" r="3" fill="#a0a0b0" opacity="0.3"/>
    <circle cx="36" cy="7" r="3" fill="#a0a0b0" opacity="0.3"/>
  </g>

  <!-- reqsh title -->
  <text x="200" y="297" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace" font-size="72" font-weight="700" fill="url(#accent)" letter-spacing="4">reqsh</text>

  <!-- Tagline -->
  <text x="200" y="340" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace" font-size="16" fill="#7878a0" letter-spacing="5">INTERACTIVE HTTP SHELL</text>

  <!-- Divider -->
  <line x1="200" y1="362" x2="440" y2="362" stroke="#2a2a4a" stroke-width="1"/>

  <!-- ===== RIGHT SIDE: Terminal Mockup ===== -->

  <g transform="translate(560, 80)">
    <!-- Terminal window frame -->
    <rect x="0" y="0" width="560" height="360" rx="10" fill="#08080f" stroke="#2a2a4a" stroke-width="1.5"/>

    <!-- Terminal title bar -->
    <rect x="0" y="0" width="560" height="36" rx="10" fill="url(#terminalHeader)"/>
    <rect x="0" y="20" width="560" height="16" fill="url(#terminalHeader)"/>

    <!-- Traffic dots -->
    <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="58" cy="18" r="5" fill="#28c840"/>

    <!-- Window title -->
    <text x="280" y="23" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="12" fill="#7878a0" text-anchor="middle">reqsh — 80×24</text>

    <!-- ===== Terminal lines ===== -->
    <!-- Line 1: prompt -->
    <text x="20" y="75" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">$</text>
    <text x="36" y="75" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#ff3333" font-weight="600">base</text>
    <text x="80" y="75" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#e0e0e0">https://api.example.com</text>

    <!-- Line 2: prompt -->
    <text x="20" y="105" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">$</text>
    <text x="36" y="105" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#ff3333" font-weight="600">header</text>
    <text x="96" y="105" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#6bc5ff">Authorization</text>
    <text x="224" y="105" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#e0e0e0">Bearer token_xyz</text>

    <!-- Line 3: empty -->
    <!-- Line 4: prompt -->
    <text x="20" y="145" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">$</text>
    <text x="36" y="145" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#ff3333" font-weight="600">POST</text>
    <text x="84" y="145" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#e0e0e0">/api/users</text>

    <!-- Line 5: body content -->
    <text x="36" y="175" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">Content-Type:</text>
    <text x="172" y="175" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#6bc5ff">application/json</text>

    <!-- Line 6: empty -->
    <!-- Line 7: JSON body -->
    <text x="36" y="215" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">{</text>
    <text x="52" y="245" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#6bc5ff">"name"</text>
    <text x="120" y="245" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">:</text>
    <text x="132" y="245" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#98d98e">"Alice"</text>
    <text x="244" y="245" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">,</text>
    <text x="52" y="275" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#6bc5ff">"role"</text>
    <text x="112" y="275" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">:</text>
    <text x="124" y="275" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#98d98e">"admin"</text>
    <text x="36" y="305" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#7878a0">}</text>

    <!-- Line 8: send command -->
    <text x="36" y="340" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="15" fill="#28c840">::send</text>

    <!-- Blinking cursor -->
    <rect x="110" y="328" width="8" height="16" rx="1" fill="#ff3333" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)"/>

  <!-- Bottom-right URL -->
  <text x="1170" y="610" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#3a3a5a" text-anchor="end">reqsh.vercel.app</text>
</svg>
